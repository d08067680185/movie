services:
  backend:
    build: ./backend
    container_name: movie-backend
    restart: unless-stopped
    volumes:
      - ./backend/movie_search.db:/app/movie_search.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./movie_search.db
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://movie.mxzshs.com}
      - SPIDER_INTERVAL_HOURS=${SPIDER_INTERVAL_HOURS:-6}
      - PANSOU_URL=http://pansou:8888
      - TZ=Asia/Shanghai
    expose:
      - "8000"
    depends_on:
      - pansou
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  pansou:
    image: ghcr.io/fish2018/pansou:latest
    container_name: movie-pansou
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    expose:
      - "8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        BACKEND_URL: "http://backend:8000"
    container_name: movie-frontend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - BACKEND_URL=http://backend:8000
    ports:
      - "8092:3000"
    depends_on:
      - backend
